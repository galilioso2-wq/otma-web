<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 220" fill="none">
  <defs>
    <linearGradient id="g" x1="60" y1="0" x2="220" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#82F2FF"/>
      <stop offset="48%" stop-color="#38AAFF"/>
      <stop offset="100%" stop-color="#1230CC"/>
    </linearGradient>
  </defs>

  <!-- Human head silhouette — left-facing profile -->
  <path
    d="M 118,18
       C 100,15 78,30 64,52
       C 52,70 44,90 45,108
       C 46,118 50,124 52,132
       C 54,142 53,150 51,160
       C 49,170 53,180 62,187
       L 72,196
       L 106,196
       C 124,184 140,166 146,144
       C 155,118 153,88 144,64
       C 135,40 130,22 118,18 Z"
    stroke="url(#g)" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round"
  />

  <!-- Neural hub (junction node) -->
  <circle cx="138" cy="88" r="4.5" stroke="url(#g)" stroke-width="2.2"/>

  <!-- Line 1: straight up to top node -->
  <line x1="136" y1="83" x2="120" y2="20" stroke="url(#g)" stroke-width="2"/>
  <circle cx="120" cy="15" r="5.5" stroke="url(#g)" stroke-width="2.2"/>

  <!-- Line 2: up-left to node -->
  <line x1="134" y1="84" x2="90" y2="44" stroke="url(#g)" stroke-width="2"/>
  <circle cx="87" cy="41" r="5.5" stroke="url(#g)" stroke-width="2.2"/>

  <!-- Line 3: up-right with intermediate node then end node -->
  <line x1="142" y1="83" x2="196" y2="33" stroke="url(#g)" stroke-width="2"/>
  <circle cx="169" cy="58" r="4" stroke="url(#g)" stroke-width="2"/>
  <circle cx="199" cy="30" r="5.5" stroke="url(#g)" stroke-width="2.2"/>

  <!-- Line 4: right toward concentric circles -->
  <line x1="144" y1="92" x2="176" y2="95" stroke="url(#g)" stroke-width="2"/>

  <!-- Concentric circles — target / sensor element -->
  <circle cx="196" cy="96" r="21" stroke="url(#g)" stroke-width="2.2"/>
  <circle cx="196" cy="96" r="12" stroke="url(#g)" stroke-width="2.2"/>
  <circle cx="196" cy="96" r="4" fill="url(#g)"/>

  <!-- Line 5: from circles down-right to final node -->
  <line x1="213" y1="108" x2="235" y2="142" stroke="url(#g)" stroke-width="2"/>
  <circle cx="238" cy="146" r="5.5" stroke="url(#g)" stroke-width="2.2"/>
</svg>
