  <circle cx="116" cy="100" r="36" stroke="#00D4FF" stroke-width="1.5"/>
  <!-- cardinal dots -->
  <circle cx="100" cy="28" r="2.5" fill="#00D4FF" fill-opacity="0.6"/>
  <circle cx="100" cy="172" r="2.5" fill="#00D4FF" fill-opacity="0.6"/>
  <circle cx="28" cy="100" r="2.5" fill="#00D4FF" fill-opacity="0.6"/>
  <circle cx="172" cy="100" r="2.5" fill="#00D4FF" fill-opacity="0.6"/>
  <!-- luminous center -->
  <circle cx="100" cy="100" r="7" fill="#00D4FF" fill-opacity="0.2"/>
  <circle cx="100" cy="100" r="4" fill="#00D4FF"/>
</svg>
