<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none">
  <rect width="520" height="120" rx="12" fill="#080D18"/>
  <!-- synthesis mark -->
  <g transform="translate(20, 10)">
    <!-- outer orbit -->
    <circle cx="50" cy="50" r="44" stroke="#00D4FF" stroke-width="0.6" stroke-opacity="0.3"/>
    <!-- left circle -->
    <circle cx="39" cy="50" r="22" stroke="#00D4FF" stroke-width="1.2"/>
    <!-- right circle -->
    <circle cx="61" cy="50" r="22" stroke="#00D4FF" stroke-width="1.2"/>
    <!-- cardinal dots -->
    <circle cx="50" cy="6" r="2" fill="#00D4FF" fill-opacity="0.6"/>
    <circle cx="50" cy="94" r="2" fill="#00D4FF" fill-opacity="0.6"/>
    <circle cx="6" cy="50" r="2" fill="#00D4FF" fill-opacity="0.6"/>
    <circle cx="94" cy="50" r="2" fill="#00D4FF" fill-opacity="0.6"/>
    <!-- center -->
    <circle cx="50" cy="50" r="5" fill="#00D4FF" fill-opacity="0.2"/>
    <circle cx="50" cy="50" r="3" fill="#00D4FF"/>
  </g>
  <!-- wordmark OTMA -->
  <text x="140" y="66" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="500" font-size="44" letter-spacing="6" fill="#FFFFFF">OTMA</text>
  <!-- tagline -->
  <text x="141" y="86" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="9" letter-spacing="3" fill="#4A5878">INTELLIGENT · AI · AGENTS</text>
</svg>
