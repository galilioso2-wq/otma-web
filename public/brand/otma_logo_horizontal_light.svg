<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" fill="none">
  <!-- synthesis mark -->
  <g transform="translate(10, 10)">
    <!-- outer orbit -->
    <circle cx="40" cy="40" r="36" stroke="#0099BB" stroke-width="0.6" stroke-opacity="0.4"/>
    <!-- left circle -->
    <circle cx="31" cy="40" r="18" stroke="#0099BB" stroke-width="1.2"/>
    <!-- right circle -->
    <circle cx="49" cy="40" r="18" stroke="#0099BB" stroke-width="1.2"/>
    <!-- cardinal dots -->
    <circle cx="40" cy="4" r="1.5" fill="#0099BB" fill-opacity="0.6"/>
    <circle cx="40" cy="76" r="1.5" fill="#0099BB" fill-opacity="0.6"/>
    <circle cx="4" cy="40" r="1.5" fill="#0099BB" fill-opacity="0.6"/>
    <circle cx="76" cy="40" r="1.5" fill="#0099BB" fill-opacity="0.6"/>
    <!-- center -->
    <circle cx="40" cy="40" r="4" fill="#0099BB" fill-opacity="0.2"/>
    <circle cx="40" cy="40" r="2.5" fill="#0099BB"/>
  </g>
  <!-- wordmark -->
  <text x="110" y="54" font-family="'Space Grotesk', system-ui, sans-serif" font-weight="500" font-size="38" letter-spacing="5" fill="#080D18">OTMA</text>
  <!-- tagline -->
  <text x="111" y="72" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="8" letter-spacing="2.5" fill="#4A5878">INTELLIGENT · AI · AGENTS</text>
</svg>
